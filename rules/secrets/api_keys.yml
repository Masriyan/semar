---
version: "1.0"
category: secrets
author: "SEMAR Core Team"
last_updated: "2026-06-28"

# These YAML definitions document the detection intelligence shipped in
# internal/modules/secrets/patterns.go. They are the canonical reference for
# each rule's classification, scoring, and remediation guidance.

rules:
  - id: SEMAR-SEC-001
    name: "Anthropic API key detected"
    description: >
      An Anthropic API key (sk-ant-* format) was detected in plaintext. These keys
      provide full API access and must never be stored in files that may be
      committed to version control or shared.
    severity: CRITICAL
    confidence: HIGH
    detection:
      method: regex
      patterns:
        - pattern: 'sk-ant-[a-zA-Z0-9_\-]{20,}'
          flags: [MULTILINE]
      entropy_threshold: 4.5
    classification:
      owasp_llm: ["LLM02", "LLM07"]
      mitre_atlas: ["AML.T0040"]
      cwe: ["CWE-312", "CWE-798"]
      nist_ai_rmf: ["GOVERN-1.1", "MANAGE-2.4"]
    scoring:
      base_cvss: 9.8
      cvss_vector: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
    remediation:
      summary: "Remove key from file, rotate immediately, use environment variables"
      steps:
        - "Remove the API key from the file immediately"
        - "Rotate the compromised key at console.anthropic.com"
        - "Store in environment variable: export ANTHROPIC_API_KEY=..."
        - "Verify no git history exposure: git log -p | grep sk-ant"
      references:
        - "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
        - "https://docs.anthropic.com/en/api/getting-started"
    false_positives:
      - "Explicitly commented placeholder values"
      - "Test fixtures with obviously fake keys"
    filters:
      - type: context_check
        pattern: '(example|placeholder|your[_-]?key|xxx|fake|test)'
        action: lower_confidence

  - id: SEMAR-SEC-002
    name: "OpenAI API key detected"
    severity: CRITICAL
    confidence: HIGH
    detection:
      method: regex
      patterns:
        - pattern: 'sk-(proj-)?[a-zA-Z0-9]{20,}'
    classification:
      owasp_llm: ["LLM02", "LLM07"]
      cwe: ["CWE-312", "CWE-798"]

  - id: SEMAR-SEC-006
    name: "High-entropy string (likely secret)"
    severity: HIGH
    confidence: MEDIUM
    detection:
      method: entropy
      entropy_threshold: 4.5
      context_threshold: 3.8   # lowered when var name implies a secret
    classification:
      owasp_llm: ["LLM02"]
      cwe: ["CWE-312"]
